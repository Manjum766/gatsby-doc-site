# ─────────────────────────────────────────────────────────────────────────────
# PR Review Agent
#
# Triggered on every pull_request event (opened, edited, synchronize, reopened)
# targeting the master branch.
#
# Jobs:
#   1. enforce-standards  – PR title, branch name, description checks
#   2. build-and-lint     – gatsby build + console.log + secret heuristic
#   3. llm-code-review    – GPT-4o diff review (skipped if no key)
#   4. security-scan      – npm audit + gitleaks
#   5. pr-review-gate     – aggregates 1+2+4; branch protection hooks here
#   6. slack-merge-alert  – Slack notification with Merge button (all checks green)
#
# Required secrets (Settings → Secrets → Actions):
#   OPENAI_API_KEY      – optional; LLM job is skipped when absent
#   SLACK_WEBHOOK_URL   – Slack Incoming Webhook URL for merge-ready alerts
#                         Create at: https://api.slack.com/apps → Incoming Webhooks
#
# Required repo settings BEFORE this works:
#   Settings → Actions → General → Workflow permissions → Read and write
#   Settings → Branches → master → Require status check: "✅ PR Review Gate"
# ─────────────────────────────────────────────────────────────────────────────

name: PR Review Agent

on:
  pull_request:
    branches: [master]
    types: [opened, edited, synchronize, reopened]

# Cancel stale runs when a new push arrives on the same PR.
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Enforce Enterprise PR Standards
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  enforce-standards:
    name: 📋 Enforce PR Standards
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title (Conventional Commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"
          # Normalise common formatting mistakes before matching:
          #   "fix (scope):"  → "fix(scope):"   (space before opening paren)
          #   "fix( scope ):" → "fix(scope):"   (spaces inside parens)
          #   "fix(scope) :"  → "fix(scope):"   (space before colon)
          # Uses perl for consistent behaviour across BSD (macOS) and GNU (Linux) runners.
          NORMALISED=$(echo "$PR_TITLE" \
            | perl -pe 's/ +\(/(/ ; s/\( +/(/ ; s/ +\)/)/ ; s/\) +:/):/')
          echo "Normalised title: $NORMALISED"
          # Scope may contain letters, digits, spaces, slashes, underscores, hyphens
          if echo "$NORMALISED" | grep -Eq \
            '^(feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert)(\([a-z0-9 /_-]+\))?!?: .{1,72}$'; then
            echo "✅ PR title is valid Conventional Commit format"
          else
            echo "❌ PR title does not follow Conventional Commits"
            echo "   Expected: type(scope): description"
            echo "   Got:      $PR_TITLE"
            echo ""
            echo "   Valid types: feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert"
            echo "   Example:  feat(sidebar): add PR review agent nav link"
            exit 1
          fi

      - name: Validate branch name convention
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "Branch: $BRANCH"
          if echo "$BRANCH" | grep -Eq \
            '^(feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert|hotfix|release)/[a-z0-9][a-z0-9_-]*$'; then
            echo "✅ Branch name is valid"
          else
            echo "❌ Branch name does not follow convention"
            echo "   Expected: type/short-description (e.g. fix/login-bug)"
            echo "   Got:      $BRANCH"
            exit 1
          fi

      - name: Check PR has a non-empty description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          STRIPPED=$(echo "$PR_BODY" | tr -d '[:space:]')
          if [ -z "$STRIPPED" ]; then
            echo "❌ PR description is empty — fill in the PR template before requesting review."
            exit 1
          fi
          echo "✅ PR description is present (${#STRIPPED} chars)"
          # Warn (not block) if no checklist items are ticked
          if echo "$PR_BODY" | grep -q '\- \[x\]'; then
            echo "✅ At least one checklist item is checked"
          else
            echo "⚠️  No checklist items ticked — please complete the PR template checklist."
          fi

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build + Code Quality
# ─────────────────────────────────────────────────────────────────────────────
  build-and-lint:
    name: 🏗️ Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Gatsby build
        run: npm run build
        env:
          NODE_ENV: production
          GATSBY_TELEMETRY_DISABLED: '1'

      - name: Check for debug statements (console.log / warn / error)
        run: |
          MATCHES=$(grep -rn \
            -e "console\.log" \
            -e "console\.warn" \
            -e "console\.error" \
            -e "console\.debug" \
            src/ \
            --include="*.js" --include="*.jsx" \
            --include="*.ts" --include="*.tsx" \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Debug statements found — remove before merging:"
            echo "$MATCHES"
            exit 1
          fi
          echo "✅ No console.log / debug statements found"

      - name: Check for hard-coded secrets
        run: |
          # Matches assignments like API_KEY = "..." that are NOT reading from process.env
          FOUND=$(grep -rn \
            -e 'API_KEY\s*=\s*["'"'"']' \
            -e 'SECRET\s*=\s*["'"'"']' \
            -e 'PASSWORD\s*=\s*["'"'"']' \
            -e 'PRIVATE_KEY\s*=\s*["'"'"']' \
            -e 'TOKEN\s*=\s*["'"'"']' \
            src/ gatsby-config.js gatsby-node.js \
            --include="*.js" --include="*.jsx" \
            --include="*.ts" --include="*.tsx" \
            2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "❌ Possible hard-coded secrets detected:"
            echo "$FOUND"
            echo ""
            echo "   Use process.env.MY_VAR instead of hard-coded values."
            exit 1
          fi
          echo "✅ No hard-coded secrets found"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — LLM Code Review (skipped when OPENAI_API_KEY is not set)
# ─────────────────────────────────────────────────────────────────────────────
  llm-code-review:
    name: 🤖 LLM Code Review
    runs-on: ubuntu-latest
    # FIX: secrets context cannot be used in `if` expressions directly.
    # Always run this job; the step itself will exit gracefully when no key.
    needs: [build-and-lint]
    if: always() && needs.build-and-lint.result == 'success'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "$BASE_SHA" "$HEAD_SHA" \
            -- 'src/**' 'gatsby-config.js' 'gatsby-node.js' 'content/**' \
            | head -n 8000 > /tmp/pr.diff
          echo "diff_lines=$(wc -l < /tmp/pr.diff)" >> "$GITHUB_OUTPUT"
          echo "Diff: $(wc -l < /tmp/pr.diff) lines"

      - name: LLM review via OpenAI
        id: llm-review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY:  ${{ github.event.pull_request.body }}
        run: |
          # Skip gracefully when key is absent
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "ℹ️  OPENAI_API_KEY not set — skipping LLM review."
            echo "review=⚠️ LLM review skipped: add the OPENAI_API_KEY secret to enable this." \
              >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIFF=$(cat /tmp/pr.diff)
          PAYLOAD=$(jq -n \
            --arg title "$PR_TITLE" \
            --arg body  "$PR_BODY" \
            --arg diff  "$DIFF" \
            '{
              model: "gpt-4o",
              temperature: 0.2,
              max_tokens: 1500,
              messages: [
                {
                  role: "system",
                  content: "You are a senior software engineer reviewing a GitHub pull request. Analyse the diff for: correctness, security vulnerabilities, performance issues, accessibility regressions, Gatsby anti-patterns, and React best-practice violations. Format your response as Markdown with these sections: ## Summary, ## Issues (table: Severity | File | Line | Description), ## Suggestions, ## Verdict (Approve / Request Changes / Comment)."
                },
                {
                  role: "user",
                  content: ("PR: " + $title + "\n\nDescription:\n" + $body + "\n\nDiff:\n```diff\n" + $diff + "\n```")
                }
              ]
            }')

          RESPONSE=$(curl -sf https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "LLM returned no content."')
          {
            echo "review<<EOF"
            echo "$REVIEW"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post LLM review as PR comment
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ steps.llm-review.outputs.review }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              '## 🤖 Automated Code Review (LLM)',
              '',
              process.env.REVIEW_BODY,
              '',
              '---',
              '_Generated by the PR Review Agent. Advisory only — a human must approve before merge._'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Security Scan
# ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical severity)
        # --audit-level=critical: high-severity findings are all inside Gatsby's
        # own locked transitive dependencies (cookie, webpack, lodash, uuid etc.)
        # and cannot be fixed without downgrading Gatsby to v3 (a breaking change).
        # We gate on critical only — re-evaluate when Gatsby v6 is released.
        run: npm audit --audit-level=critical --omit=dev

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — Gate: single required status check for branch protection
# ─────────────────────────────────────────────────────────────────────────────
  pr-review-gate:
    name: ✅ PR Review Gate
    runs-on: ubuntu-latest
    needs: [enforce-standards, build-and-lint, security-scan]
    # Run even when upstream jobs fail so the gate always reports a result.
    if: always()

    steps:
      - name: Evaluate results
        run: |
          STANDARDS="${{ needs.enforce-standards.result }}"
          BUILD="${{ needs.build-and-lint.result }}"
          SECURITY="${{ needs.security-scan.result }}"

          echo "enforce-standards : $STANDARDS"
          echo "build-and-lint    : $BUILD"
          echo "security-scan     : $SECURITY"

          FAILED=""
          [ "$STANDARDS" != "success" ] && FAILED="$FAILED\n  ❌ enforce-standards ($STANDARDS)"
          [ "$BUILD"     != "success" ] && FAILED="$FAILED\n  ❌ build-and-lint ($BUILD)"
          [ "$SECURITY"  != "success" ] && FAILED="$FAILED\n  ❌ security-scan ($SECURITY)"

          if [ -n "$FAILED" ]; then
            echo ""
            echo "The following required checks did not pass:"
            printf "$FAILED\n"
            echo ""
            echo "Fix the issues above before this PR can be merged."
            exit 1
          fi

          echo ""
          echo "✅ All required checks passed — PR is ready for human review."

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 — Slack Merge-Ready Alert
# ─────────────────────────────────────────────────────────────────────────────
  slack-merge-alert:
    name: 🔔 Slack Merge Alert
    runs-on: ubuntu-latest
    needs: [pr-review-gate]
    # Only fire when the gate actually passed (not on failure/skip).
    if: needs.pr-review-gate.result == 'success'

    steps:
      - name: Send Slack notification with Merge button
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_NUMBER:   ${{ github.event.pull_request.number }}
          PR_TITLE:    ${{ github.event.pull_request.title }}
          PR_URL:      ${{ github.event.pull_request.html_url }}
          PR_AUTHOR:   ${{ github.event.pull_request.user.login }}
          REPO:        ${{ github.repository }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "ℹ️  SLACK_WEBHOOK_URL not set — skipping Slack notification."
            exit 0
          fi

          # The merge URL opens GitHub's merge confirmation page directly.
          MERGE_URL="${PR_URL}"

          PAYLOAD=$(jq -n \
            --arg pr_number  "#${PR_NUMBER}" \
            --arg pr_title   "$PR_TITLE" \
            --arg pr_url     "$PR_URL" \
            --arg merge_url  "$MERGE_URL" \
            --arg author     "$PR_AUTHOR" \
            --arg repo       "$REPO" \
            --arg branch     "$HEAD_BRANCH" \
            '{
              blocks: [
                {
                  type: "header",
                  text: {
                    type: "plain_text",
                    text: "✅ PR Ready to Merge",
                    emoji: true
                  }
                },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: ("*PR:*\n<" + $pr_url + "|" + $pr_number + " — " + $pr_title + ">") },
                    { type: "mrkdwn", text: ("*Author:*\n@" + $author) },
                    { type: "mrkdwn", text: ("*Repo:*\n" + $repo) },
                    { type: "mrkdwn", text: ("*Branch:*\n`" + $branch + "` → `master`") }
                  ]
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "All required checks have passed: *PR Standards*, *Build & Lint*, and *Security Scan*. This PR is clear for merge."
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "🔀 Merge PR", emoji: true },
                      style: "primary",
                      url: $merge_url
                    }
                  ]
                },
                {
                  type: "divider"
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: "Triggered by *PR Review Agent* · GitHub Actions"
                    }
                  ]
                }
              ]
            }')

          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Slack notification sent (HTTP $HTTP_STATUS)"
          else
            echo "❌ Slack webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi
